name: Tests

on:
  push:
  pull_request:

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run test:coverage

      - uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend

  backend-tests:
    runs-on: ubuntu-latest
    
    services:
          mongodb:
            image: mongo:8
            ports:
              - 27017:27017
              
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run test:coverage

      - uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage/lcov.info
          flags: backend

  appointment-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: microservices/appointment-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run test:coverage

      - uses: codecov/codecov-action@v5
        with:
          files: ./microservices/appointment-service/coverage/lcov.info
          flags: appointment-service
